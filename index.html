<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Seatwork 1</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container mt-5 text-center">


    <div class="login-box p-4 shadow">
      <h1 class="mb-3">Login Page</h1>
      <p>Please enter your username and password NOW.</p>

      <input type="text" id="username" class="form-control mb-3" placeholder="EG: admin">
      <input type="password" id="password" class="form-control mb-3" placeholder="EG: 1234">

      <button class="btn btn-success w-100" onclick="authenticate()">Submit</button>
      <button class="btn btn-secondary w-100 mt-2" onclick="showCredentials()">Show Username & Password</button>

      <p id="output" class="mt-3 fw-bold"></p>
    </div>


  </div>

  <script src="main.js"></script>
</body>
</html>
